<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarkin Wanka - Bibliothèque</title>
    <!-- Modern Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#A67C00">
    <link rel="apple-touch-icon" href="assets/img/logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body class="light-theme">
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar glass-panel">
            <div class="sidebar-header" style="justify-content: center; padding: 20px 0;">
                <div class="logo">
                    <img src="assets/img/logo.png" alt="Sarkin Wanka Logo" style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover; box-shadow: 0 5px 15px rgba(0,0,0,0.3);">
                </div>
            </div>
            <ul class="nav-links">
                <li><a href="index.html"><i class="fa-solid fa-calendar-day"></i> Agenda</a></li>
                <li><a href="atelier.html"><i class="fa-solid fa-tape"></i> Atelier</a></li>
                <li><a href="boutique.html"><i class="fa-solid fa-store"></i> Boutique</a></li>
                <li class="active"><a href="bibliotheque.html"><i class="fa-solid fa-book-open"></i> Bibliothèque</a></li>
            </ul>
            <div class="sidebar-footer" style="padding-top: 2rem;">
                <button id="theme-toggle" class="btn-icon">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <div style="margin-left:auto; display:flex; gap:10px;">
                    <a href="https://sarkin-wanka.onrender.com/" target="_blank" class="btn-icon" title="Site Principal"><i class="fa-solid fa-globe"></i></a>
                    <a href="https://chamsoudine-dev.github.io/SARKIN-WANKA/" target="_blank" class="btn-icon" title="Site Secondaire"><i class="fa-solid fa-link"></i></a>
                    <a href="parametre.html" class="btn-icon" title="Paramètres" style="text-decoration:none;"><i class="fa-solid fa-gear"></i></a>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div>
                    <h1>Bibliothèque d'Archives</h1>
                    <p class="subtitle">Historique global : Travaux en cours &amp; Terminés</p>
                </div>
            </header>

            <section class="agenda-section">
                <div class="header-actions" style="margin-bottom: 20px;">
                    <div class="search-bar glass-panel" style="display: flex; align-items: center; padding: 10px 15px; border-radius: 12px; width: 100%; max-width: 500px;">
                        <i class="fa-solid fa-search" style="color: var(--text-muted); margin-right: 10px;"></i>
                        <input type="text" id="search-biblio" placeholder="Rechercher par client, type, num..." style="border: none; background: transparent; width: 100%; outline: none; color: var(--text-main); font-family: 'Outfit'; font-size: 1rem;">
                    </div>
                </div>

                <div class="glass-panel" style="overflow-x: auto; padding: 1.5rem; border-top: 4px solid var(--primary-color);">
                    <table class="table" style="width: 100%; border-collapse: collapse; text-align: left;">
                        <thead>
                            <tr style="border-bottom: 2px solid rgba(0,0,0,0.1); color: var(--text-muted);">
                                <th style="padding: 15px 10px;">Réf</th>
                                <th style="padding: 15px 10px;">Date & Statut</th>
                                <th style="padding: 15px 10px;">Client</th>
                                <th style="padding: 15px 10px;">Vêtement</th>
                                <th style="padding: 15px 10px;">Prix</th>
                                <th style="padding: 15px 10px;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="biblio-table-body">
                            <!-- JS injects here -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Script inclus -->
    <script src="assets/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => { 
            if(typeof renderBibliotheque === "function") renderBibliotheque(); 
        });
    </script>
</body>
</html>
